<!doctype html>
<html lang="en">
<head>
  <title>404 — Page not found · Andrews Peprah</title>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, width=device-width">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <style>
    :root {
      --ink:#0f1b2d; --ink-2:#16263d; --text:#e7edf5; --muted:#8693a5;
      --accent:#c98a3a; --accent-2:#e0a85a; --hair:rgba(255,255,255,.10);
      --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    }
    * { box-sizing:border-box; }
    html,body { margin:0; height:100%; }
    body {
      min-height:100%; display:flex; align-items:center; justify-content:center;
      background:
        radial-gradient(800px 500px at 80% -10%, rgba(201,138,58,.12), transparent 60%),
        linear-gradient(180deg,var(--ink),var(--ink-2));
      color:var(--text); font-family:var(--sans); padding:32px;
      background-attachment:fixed;
    }
    .grid { position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.4;
      background-image:linear-gradient(var(--hair) 1px,transparent 1px),linear-gradient(90deg,var(--hair) 1px,transparent 1px);
      background-size:26px 26px;
      -webkit-mask-image:radial-gradient(circle at 50% 35%,#000,transparent 70%);
      mask-image:radial-gradient(circle at 50% 35%,#000,transparent 70%); }
    .card { position:relative; z-index:1; max-width:560px; text-align:center; }
    .code { font-family:var(--mono); font-size:clamp(90px,20vw,180px); line-height:1; font-weight:700;
      letter-spacing:-.04em; color:transparent;
      background:linear-gradient(180deg,var(--accent-2),var(--accent)); -webkit-background-clip:text; background-clip:text;
      text-shadow:0 12px 60px rgba(201,138,58,.25); }
    .eyebrow { font-family:var(--mono); font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:var(--accent); margin:8px 0 0; }
    h1 { font-size:clamp(24px,4vw,32px); letter-spacing:-.02em; margin:16px 0 10px; }
    p { color:var(--muted); font-size:16px; line-height:1.6; margin:0 auto 28px; max-width:42ch; }
    .links { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; }
    a { text-decoration:none; font-family:var(--mono); font-size:13px; letter-spacing:.03em;
      padding:11px 20px; border-radius:99px; transition:transform .15s ease, background .15s ease; }
    a:hover { transform:translateY(-2px); }
    .primary { background:var(--accent); color:var(--ink); font-weight:600; }
    .primary:hover { background:var(--accent-2); }
    .ghost { color:var(--text); border:1px solid var(--hair); }
    .ghost:hover { border-color:var(--accent); color:var(--accent); }
    :focus-visible { outline:2px solid var(--accent); outline-offset:3px; }
  </style>
</head>
<body>
  <div class="grid"></div>
  <main class="card">
    <div class="code">404</div>
    <p class="eyebrow">Lost in the mesh</p>
    <h1>This page wandered off the map.</h1>
    <p>The link may be broken or the page moved. Let's get you back to something real.</p>
    <div class="links">
      <a class="primary" href="/">← Back home</a>
      <a class="ghost" href="/experience">Experience</a>
      <a class="ghost" href="/writing">Writing</a>
    </div>
  </main>
</body>
</html>
